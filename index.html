<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCraft UK — Professional Websites for UK Businesses</title>
    <meta name="description" content="WebCraft UK builds professional, affordable websites for UK small businesses. One-off fee, no monthly costs. See your free preview today.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:  #0F172A;
            --navy2:  #1E293B;
            --blue:   #2563EB;
            --blue-h: #1D4ED8;
            --blue-l: #EFF6FF;
            --text:   #0F172A;
            --muted:  #64748B;
            --light:  #F8FAFC;
            --border: #E2E8F0;
            --white:  #FFFFFF;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'Inter',sans-serif; color:var(--text); background:var(--white); -webkit-font-smoothing:antialiased; }

        /* ── HEADER ── */
        header {
            position:sticky; top:0; z-index:1000;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
            padding:0 2rem;
            display:flex; justify-content:space-between; align-items:center;
            height:68px;
        }
        .logo {
            font-size:1.25rem; font-weight:800; color:var(--navy);
            text-decoration:none; letter-spacing:-.02em;
        }
        .logo span { color:var(--blue); }
        nav { display:flex; gap:2rem; align-items:center; }
        nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; font-weight:500; transition:color .2s; }
        nav a:hover { color:var(--text); }
        .header-cta {
            background:var(--blue); color:#fff;
            padding:0.55rem 1.3rem; border-radius:8px;
            font-weight:600; font-size:0.88rem;
            text-decoration:none; transition:all .2s;
            white-space:nowrap;
        }
        .header-cta:hover { background:var(--blue-h); transform:translateY(-1px); box-shadow:0 4px 12px rgba(37,99,235,.3); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none; padding:4px; }
        .hamburger span { width:22px; height:2px; background:var(--text); border-radius:2px; transition:all .3s; display:block; }

        /* ── HERO ── */
        .hero {
            background:var(--navy);
            padding:6rem 2rem 5rem;
            text-align:center;
            position:relative;
            overflow:hidden;
        }
        .hero::before {
            content:'';
            position:absolute; inset:0;
            background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,0.18) 0%, transparent 70%);
        }
        .hero-inner { position:relative; max-width:820px; margin:0 auto; }
        .hero-pill {
            display:inline-flex; align-items:center; gap:0.5rem;
            background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.3);
            color:#93C5FD; padding:0.35rem 1rem;
            border-radius:999px; font-size:0.78rem; font-weight:600;
            letter-spacing:.04em; margin-bottom:1.8rem;
        }
        .hero h1 {
            font-size:clamp(2.4rem,6vw,4.2rem); font-weight:800;
            color:#fff; line-height:1.1; letter-spacing:-.03em;
            margin-bottom:1.2rem;
        }
        .hero h1 em { color:#60A5FA; font-style:normal; }
        .hero-sub {
            font-size:clamp(1rem,2.2vw,1.15rem); color:#9AA3B8;
            max-width:560px; margin:0 auto 2.5rem; line-height:1.75; font-weight:400;
        }
        .hero-btns { display:flex; gap:0.8rem; flex-wrap:wrap; justify-content:center; margin-bottom:4rem; }
        .btn-primary {
            background:var(--blue); color:#fff;
            padding:0.85rem 2rem; border-radius:8px;
            font-weight:600; font-size:0.95rem; text-decoration:none;
            transition:all .2s; display:inline-block;
        }
        .btn-primary:hover { background:var(--blue-h); transform:translateY(-2px); box-shadow:0 8px 20px rgba(37,99,235,.4); }
        .btn-ghost {
            background:rgba(255,255,255,0.07); color:#fff;
            border:1px solid rgba(255,255,255,0.15);
            padding:0.85rem 2rem; border-radius:8px;
            font-weight:600; font-size:0.95rem; text-decoration:none;
            transition:all .2s; display:inline-block;
        }
        .btn-ghost:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.3); }
        .hero-stats {
            display:flex; gap:0; flex-wrap:wrap; justify-content:center;
            border:1px solid rgba(255,255,255,0.08);
            border-radius:12px; overflow:hidden;
            background:rgba(255,255,255,0.04);
            max-width:600px; margin:0 auto;
        }
        .stat { flex:1; min-width:120px; padding:1.4rem 1rem; text-align:center; border-right:1px solid rgba(255,255,255,0.08); }
        .stat:last-child { border-right:none; }
        .stat-n { font-size:1.7rem; font-weight:800; color:#fff; letter-spacing:-.02em; line-height:1; }
        .stat-l { font-size:0.72rem; color:#64748B; margin-top:0.3rem; font-weight:500; text-transform:uppercase; letter-spacing:.06em; }

        /* ── LOGOS / TRUST BAR ── */
        .trust-bar {
            background:var(--light); border-bottom:1px solid var(--border);
            padding:1.2rem 2rem; text-align:center;
        }
        .trust-bar p { font-size:0.78rem; color:var(--muted); font-weight:500; letter-spacing:.06em; text-transform:uppercase; margin-bottom:0.8rem; }
        .trust-logos { display:flex; gap:2rem; justify-content:center; align-items:center; flex-wrap:wrap; }
        .trust-tag {
            background:#fff; border:1px solid var(--border);
            padding:0.4rem 1rem; border-radius:999px;
            font-size:0.82rem; font-weight:600; color:var(--muted);
        }

        /* ── SECTION COMMONS ── */
        .container { max-width:1100px; margin:0 auto; padding:0 2rem; }
        .section-label { font-size:0.73rem; font-weight:700; color:var(--blue); letter-spacing:.12em; text-transform:uppercase; margin-bottom:0.7rem; }
        .section-h { font-size:clamp(1.7rem,3.5vw,2.4rem); font-weight:800; letter-spacing:-.025em; line-height:1.2; margin-bottom:0.6rem; }
        .section-sub { font-size:1rem; color:var(--muted); line-height:1.7; max-width:520px; }
        .section-rule { width:40px; height:3px; background:var(--blue); border-radius:2px; margin:1rem 0 0; }

        /* ── HOW IT WORKS ── */
        .how { padding:6rem 2rem; background:#fff; }
        .how-header { text-align:center; margin-bottom:4rem; }
        .how-header .section-sub { margin:0 auto; }
        .how-header .section-rule { margin:1rem auto 0; }
        .steps { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:12px; overflow:hidden; max-width:1000px; margin:0 auto; }
        .step { background:#fff; padding:2.5rem 2rem; position:relative; transition:background .2s; }
        .step:hover { background:var(--light); }
        .step-num { font-size:0.72rem; font-weight:700; color:var(--blue); letter-spacing:.1em; margin-bottom:1rem; background:var(--blue-l); display:inline-block; padding:0.2rem 0.7rem; border-radius:999px; }
        .step h3 { font-size:1rem; font-weight:700; letter-spacing:-.01em; margin-bottom:0.5rem; }
        .step p { font-size:0.875rem; color:var(--muted); line-height:1.65; }

        /* ── FEATURES ── */
        .features-section { padding:6rem 2rem; background:var(--light); }
        .features-inner { display:grid; grid-template-columns:1fr 1fr; gap:5rem; align-items:center; max-width:1000px; margin:0 auto; }
        .features-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
